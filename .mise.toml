# ~/.config/dotfiles/.mise.toml
# Self-declaration for the deterministic install, doctor, and sync tasks.

[env]
DOTFILES_NAME    = "dotfiles"
DOTFILES_RUNTIME = "~"
DOTFILES_DIR     = "{{config_root}}"

# Tasks are declared explicitly below so the colon-namespaced names
# (install:zsh, install:git, install:brew) are canonical. Auto-discovery
# via `task_config.includes = ["scripts"]` is intentionally omitted —
# it would duplicate each task under the file-derived name.

[tasks.bootstrap]
description = "Run install:zsh, install:git, install:agents, install:brew in order (idempotent)"
run = """
mise run install:zsh
mise run install:git
mise run install:agents
mise run install:brew
"""

[tasks."install:zsh"]
description = "Symlink home/.zshrc into $HOME with backup; seed ~/.zshrc.local"
run = "./scripts/install-zsh.sh"

[tasks."install:git"]
description = "Create private ~/.gitconfig loader for public base and local overlay"
run = "./scripts/install-git.sh"

[tasks."install:agents"]
description = "Create generated ~/.agents runtime from public sources and pinned third parties"
run = "./scripts/install-agents.sh"

[tasks."install:skills"]
description = "Restore shared skills from tracked first-party sources and the third-party lock"
run = "./scripts/restore-shared-skills.sh"

[tasks."install:brew"]
description = "Install packages from the active profile's Brewfile"
run = "./scripts/install-brew.sh"

[tasks.doctor]
description = "Cross-check installed state against repo expectations"
run = "./scripts/doctor.sh"

[tasks."check:public"]
description = "Verify public entrypoints, required paths, and fixture bootstrap"
run = "./scripts/check-public-contract.sh"

[tasks."check:public:network"]
description = "Also verify the published raw installer URL resolves"
run = "./scripts/check-public-contract.sh --network"

[tasks."check:safety"]
description = "Reject secrets, private runtime, and unmanaged third-party material"
run = "./scripts/check-public-safety.sh"

[tasks."test:safety"]
description = "Exercise public-safety gates with positive and negative fixtures"
run = "./scripts/test-public-safety.sh"

[tasks."test:agent-runtime"]
description = "Exercise non-destructive agent runtime migration in an isolated HOME"
run = "./scripts/test-agent-runtime.sh"

[tasks."test:git-runtime"]
description = "Prove global Git writes cannot mutate tracked public source"
run = "./scripts/test-git-runtime.sh"

[tasks."check:gitleaks"]
description = "Scan the tracked public tree with the pinned Gitleaks configuration"
run = "gitleaks dir --no-banner --redact --config .gitleaks.toml ."

[tasks.sync]
description = "Fast-forward ~/.config/dotfiles to origin/master"
run = """
cd $DOTFILES_DIR
git fetch --quiet origin
git merge --ff-only origin/master
"""
