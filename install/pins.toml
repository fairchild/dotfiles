# install/pins.toml — supply-chain pinning for the bootstrap installer.
#
# Updated by .github/workflows/update-mise-pin.yml (weekly cron + manual
# dispatch). Reviewers: do not bump these by hand. The workflow's PR carries
# upstream changelog excerpts and a re-verified GPG signature in the body.
#
# What's pinned:
#   - The exact mise release tag the installer downloads.
#   - SHA256 hashes for each supported platform binary (raw, not tarballs —
#     simpler install path; equivalent assurance).
#   - jdx's GPG signing key fingerprint for verifying SHASUMS256.asc when
#     the bumper workflow runs and (optionally) at install time.
#
# What's intentionally NOT here:
#   - musl variants (Alpine, distroless) — add when needed.
#   - Windows binaries — out of scope for this umbrella.

[mise]
version = "v2026.7.7"
released_at = "2026-07-15T18:49:36Z"
release_url = "https://github.com/jdx/mise/releases/tag/v2026.7.7"
asset_url_template = "https://github.com/jdx/mise/releases/download/{version}/mise-{version}-{platform}"
shasums_url = "https://github.com/jdx/mise/releases/download/v2026.7.7/SHASUMS256.asc"

[mise.sha256]
# Raw binary assets (no tar extraction needed at install time).
"linux-x64"   = "429f71e7e989908bf975aafac9066329c16e2d8fc7cd8e74fdf21dd6300ffe7c"
"linux-arm64" = "1b4ef061d25f0ceb508f11169482f3074e55c1698a1494f666386b2fcfb46b9b"
"macos-x64"   = "7b860e6495eea9a264a16dae575ac20d5618ea2fe97905756c661eb02035c5d9"
"macos-arm64" = "5b890cccc75fc43a494b83ace21dbd2ee26120ff19ba1994cdcd054b3a15abbd"

[mise.signing]
# Release signing key for mise. NOT the same as the personal GPG keys at
# https://github.com/jdx.gpg — those are jdx's keys-as-a-person, useful for
# verifying commits. The *release* signing key is published separately as
# the apt-keyring URL below and on keys.openpgp.org. Verified on 2026-05-10
# against the v2026.5.5 SHASUMS256.asc signature.
gpg_key_fingerprint = "24853EC9F655CE80B48E6C3A8B81C9D17413A06D"
gpg_key_url = "https://mise.en.dev/gpg-key.pub"
gpg_key_owner = "mise releases <release@mise.jdx.dev>"
# Bumper workflow imports this key, verifies SHASUMS256.asc, then updates
# the [mise.sha256] table. If the fingerprint ever changes, that's a hard
# stop — re-validate the new key by an out-of-band channel before bumping.

[gitleaks]
# Open-source CLI used by .github/workflows/public-safety.yml. The workflow
# downloads this exact Linux x64 release archive and verifies it before use.
version = "v2026.7.7"
linux_x64_sha256 = "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
